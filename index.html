<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar System Explorer</title>

<style>
/* Base */
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0b0f1a;
    color: #e6edf3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Subtle star background */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
    background-size: 120px 120px, 200px 200px;
    background-position: 0 0, 60px 60px;
    opacity: 0.15;
}

/* Container */
.container {
    text-align: center;
    z-index: 1;
}

/* Title */
h1 {
    font-size: 100px;
    font-weight: 500;
    margin-bottom: 400px;
    letter-spacing: 1px;
}

/* Button group */
.buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
}

/* Buttons */
.btn {
    padding: 50px 100px;
    font-size: 50px;
    border: 1px solid #2f81f7;
    border-radius: 6px;
    background: transparent;
    color: #2f81f7;
    cursor: pointer;
    transition: all 0.25s ease;
}

/* Hover */
.btn:hover {
    background: #2f81f7;
    color: #0b0f1a;
}

/* Click */
.btn:active {
    transform: scale(0.97);
}

/* Fade transition */
.fade-out {
    opacity: 0;
    transition: opacity 0.4s ease;
}
</style>

</head>
<body>

<div class="container">
    <h1>Solar System Explorer</h1>

    <div class="buttons">
        <button class="btn" onclick="goTo('planets.html')">Planets</button>
        <button class="btn" onclick="goTo('moons.html')">Moons</button>
    </div>
</div>

<script>
function goTo(page) {
    document.body.classList.add("fade-out");
    setTimeout(() => {
        window.location.href = page;
    }, 400);
}
</script>
<style>#wm {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  
  font-size: 50px;
  font-family: Arial, sans-serif;
  color: white;
  opacity: 50;

  pointer-events: none; /* 🔑 no interference */
  user-select: none;

  z-index: 9999;
}</style>
</body>
</html>
